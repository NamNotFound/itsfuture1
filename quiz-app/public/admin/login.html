<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luminous Quiz — Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{colors:{
    "surface-container-low":"#131313","secondary":"#c08cf7","surface-container-highest":"#262626",
    "surface":"#0e0e0e","primary":"#ba9eff","on-primary":"#39008c","outline-variant":"#484847",
    "surface-container-high":"#20201f","surface-container":"#1a1a1a","tertiary":"#ff97b5",
    "primary-dim":"#8455ef","on-surface":"#ffffff","on-surface-variant":"#adaaaa","error":"#ff6e84",
  },fontFamily:{"headline":["Manrope"],"body":["Inter"],"label":["Inter"]},
  borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"}}}}
</script>
<style>
  body{background-color:#0e0e0e;color:#fff;-webkit-font-smoothing:antialiased;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;}
  .toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:12px;}
  .toast{padding:12px 18px;border-radius:10px;font-size:.875rem;font-weight:500;min-width:220px;animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;}
  .toast.success{background:rgba(67,233,123,.12);border:1px solid rgba(67,233,123,.25);color:#43e97b;}
  .toast.error{background:rgba(215,51,87,.12);border:1px solid rgba(215,51,87,.3);color:#ff6e84;}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body class="font-body min-h-screen flex flex-col">
<div class="toast-container" id="toastContainer"></div>

<nav class="fixed top-0 w-full z-50 bg-[#0e0e0e]/80 backdrop-blur-xl border-b border-[#484847]/15 flex justify-between items-center px-6 md:px-8 py-4">
  <span class="text-xl font-bold bg-gradient-to-br from-[#ba9eff] to-[#8455ef] bg-clip-text text-transparent font-headline tracking-tight">Luminous Quiz</span>
  <a href="/" class="text-[#adaaaa] hover:text-white transition-colors text-sm flex items-center gap-1">
    <span class="material-symbols-outlined text-base">arrow_back</span> Về trang chính
  </a>
</nav>

<main class="flex-grow flex items-center justify-center pt-20 px-6 relative overflow-hidden">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-0 right-0 w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="w-full max-w-[420px] z-10">
    <div class="bg-surface-container border border-outline-variant/10 rounded-2xl p-8 md:p-10 shadow-2xl">
      <div class="mb-8">
        <span class="text-[10px] font-label uppercase tracking-widest text-primary font-semibold mb-2 block">System Access</span>
        <h1 class="font-headline text-3xl font-extrabold tracking-tight mb-2">Admin Login</h1>
        <p class="font-body text-on-surface-variant text-sm leading-relaxed">Đăng nhập để truy cập trang quản trị.</p>
      </div>

      <div class="space-y-5">
        <div class="space-y-2">
          <label class="font-label text-xs font-medium text-on-surface-variant" for="username">Tên đăng nhập</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined text-xl">person</span>
            </div>
            <input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-highest border border-transparent focus:border-primary/50 rounded-xl text-on-surface placeholder:text-on-surface-variant/40 font-body transition-all outline-none" id="username" placeholder="admin" type="text" autocomplete="username"/>
          </div>
        </div>

        <div class="space-y-2">
          <label class="font-label text-xs font-medium text-on-surface-variant" for="password">Mật khẩu</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined text-xl">lock</span>
            </div>
            <input class="block w-full pl-11 pr-12 py-3.5 bg-surface-container-highest border border-transparent focus:border-primary/50 rounded-xl text-on-surface placeholder:text-on-surface-variant/40 font-body transition-all outline-none" id="password" placeholder="••••••••" type="password" autocomplete="current-password"/>
            <button type="button" onclick="togglePass()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined text-xl" id="eyeIcon">visibility</span>
            </button>
          </div>
        </div>

        <button id="loginBtn" onclick="login()" class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-extrabold text-base tracking-tight hover:shadow-[0_0_30px_rgba(186,158,255,0.4)] transition-all duration-300 active:scale-[0.98] disabled:opacity-50 mt-2">
          Đăng nhập
        </button>
      </div>
    </div>
  </div>
</main>

<script>
  if(localStorage.getItem('adminToken'))window.location.href='/admin/dashboard';

  function showToast(msg,type='info',dur=3000){
    const c=document.getElementById('toastContainer');
    const icons={success:'✅',error:'❌',info:'ℹ️'};
    const t=document.createElement('div');t.className=`toast ${type}`;
    t.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{t.style.animation='toastIn .3s ease reverse';setTimeout(()=>t.remove(),300);},dur);
  }

  function togglePass(){
    const inp=document.getElementById('password');
    const icon=document.getElementById('eyeIcon');
    const isPass=inp.type==='password';
    inp.type=isPass?'text':'password';
    icon.textContent=isPass?'visibility_off':'visibility';
  }

  document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});

  async function login(){
    const username=document.getElementById('username').value.trim();
    const password=document.getElementById('password').value;
    const btn=document.getElementById('loginBtn');
    if(!username||!password){showToast('Vui lòng nhập đầy đủ!','error');return;}
    btn.disabled=true;btn.textContent='Đang đăng nhập...';
    try{
      const res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||'Sai thông tin');
      localStorage.setItem('adminToken',data.token);
      localStorage.setItem('adminUsername',data.username);
      showToast('Đăng nhập thành công!','success');
      setTimeout(()=>window.location.href='/admin/dashboard',600);
    }catch(e){
      showToast(e.message,'error');
      btn.disabled=false;btn.textContent='Đăng nhập';
    }
  }
</script>
</body>
</html>
