<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luminous Quiz — Kết quả</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{colors:{
    "surface-container-low":"#131313","error-dim":"#d73357","secondary":"#c08cf7",
    "surface-container-highest":"#262626","surface":"#0e0e0e","primary":"#ba9eff",
    "on-primary":"#39008c","outline-variant":"#484847","surface-container-high":"#20201f",
    "surface-container":"#1a1a1a","tertiary":"#ff97b5","surface-container-lowest":"#000000",
    "primary-dim":"#8455ef","on-surface":"#ffffff","on-surface-variant":"#adaaaa",
    "error":"#ff6e84","primary-container":"#ae8dff",
  },fontFamily:{"headline":["Manrope"],"body":["Inter"],"label":["Inter"]},
  borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"}}}}
</script>
<style>
  body{background-color:#0e0e0e;color:#fff;-webkit-font-smoothing:antialiased;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  .glass-panel{background:rgba(44,44,44,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  .toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:12px;}
  .toast{padding:12px 18px;border-radius:10px;font-size:.875rem;font-weight:500;min-width:220px;animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;}
  .toast.success{background:rgba(67,233,123,.12);border:1px solid rgba(67,233,123,.25);color:#43e97b;}
  .toast.error{background:rgba(215,51,87,.12);border:1px solid rgba(215,51,87,.3);color:#ff6e84;}
  .toast.info{background:rgba(186,158,255,.1);border:1px solid rgba(186,158,255,.2);color:#ba9eff;}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(14,14,14,.85);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .loading-overlay.show{display:flex;}
  .spinner{width:40px;height:40px;border:3px solid #262626;border-top-color:#ba9eff;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .score-ring{stroke-dasharray:440;transition:stroke-dashoffset 1s ease;}
  .fade-up{animation:fadeUp .5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="font-body min-h-screen">
<div class="toast-container" id="toastContainer"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="text-on-surface-variant text-sm">Đang lưu kết quả...</p>
</div>

<nav class="fixed top-0 w-full z-50 bg-[#0e0e0e]/80 backdrop-blur-xl border-b border-[#484847]/15 flex justify-between items-center px-6 md:px-8 py-4">
  <span class="text-xl font-bold bg-gradient-to-br from-[#ba9eff] to-[#8455ef] bg-clip-text text-transparent font-headline tracking-tight">Luminous Quiz</span>
  <a href="/leaderboard" class="text-[#adaaaa] hover:text-white transition-colors font-headline text-sm flex items-center gap-1">
    <span class="material-symbols-outlined text-base">leaderboard</span> Xếp hạng
  </a>
</nav>

<main class="pt-28 pb-20 px-4 md:px-6 max-w-7xl mx-auto">
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10 fade-up">
    <!-- Score Circle -->
    <div class="lg:col-span-5 glass-panel rounded-2xl p-8 md:p-10 border-t border-white/5 relative overflow-hidden flex flex-col items-center justify-center">
      <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
      <div class="relative w-52 h-52 md:w-64 md:h-64 mb-6">
        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 256 256">
          <circle class="text-surface-container-highest" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-width="12"/>
          <circle class="text-primary score-ring" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-linecap="round" stroke-width="12" id="scoreRing"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-5xl md:text-6xl font-extrabold font-headline tracking-tighter" id="scoreDisplay">0/0</span>
          <span class="text-xs font-label tracking-widest text-on-surface-variant uppercase mt-1">Điểm số</span>
        </div>
      </div>
      <h1 class="text-2xl md:text-3xl font-headline font-bold mb-2 text-center" id="resultTitle">Đang tính...</h1>
      <p class="text-on-surface-variant text-center text-sm max-w-xs" id="resultName"></p>
    </div>

    <!-- Stats Bento -->
    <div class="lg:col-span-7 grid grid-cols-2 gap-4">
      <div class="col-span-2 glass-panel rounded-2xl p-6 md:p-8 border-t border-white/5 flex items-center justify-between">
        <div>
          <span class="text-xs font-label tracking-widest text-on-surface-variant uppercase block mb-1">Tỷ lệ đúng</span>
          <h2 class="text-3xl md:text-4xl font-headline font-extrabold" id="pctDisplay">0%</h2>
        </div>
        <div class="flex flex-col items-end">
          <span class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold mb-2" id="rankBadge">—</span>
          <span class="text-xs text-on-surface-variant" id="resultIcon">🎯</span>
        </div>
      </div>
      <div class="bg-surface-container rounded-2xl p-5 md:p-6 border-l-4 border-primary">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1">check_circle</span>
          <span class="text-xs font-label tracking-widest text-on-surface-variant uppercase">Đúng</span>
        </div>
        <div class="text-3xl font-headline font-bold" id="correctNum">0</div>
      </div>
      <div class="bg-surface-container rounded-2xl p-5 md:p-6 border-l-4 border-error-dim">
        <div class="flex items-center gap-2 mb-3">
          <span class="material-symbols-outlined text-error-dim text-xl" style="font-variation-settings:'FILL' 1">cancel</span>
          <span class="text-xs font-label tracking-widest text-on-surface-variant uppercase">Sai</span>
        </div>
        <div class="text-3xl font-headline font-bold" id="wrongNum">0</div>
      </div>
      <div id="savedBadge" class="col-span-2 hidden bg-surface-container rounded-2xl p-5 border-l-4 border-tertiary">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-tertiary text-xl" style="font-variation-settings:'FILL' 1">verified</span>
          <span class="text-sm font-bold">Điểm đã được lưu vào bảng xếp hạng!</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-2xl fade-up" style="animation-delay:.2s">
    <a href="/leaderboard" class="flex items-center justify-center gap-2 py-4 rounded-xl bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold shadow-[0_10px_20px_-5px_rgba(132,85,239,0.4)] hover:shadow-[0_15px_30px_-5px_rgba(132,85,239,0.5)] transition-all active:scale-95">
      <span class="material-symbols-outlined">leaderboard</span> Bảng xếp hạng
    </a>
    <button onclick="playAgain()" class="flex items-center justify-center gap-2 py-4 rounded-xl border border-outline-variant/20 text-on-surface font-headline font-bold hover:bg-surface-container-high transition-all active:scale-95">
      <span class="material-symbols-outlined">replay</span> Làm lại
    </button>
  </div>
</main>

<script>
  function showToast(msg,type='info',dur=3000){
    const c=document.getElementById('toastContainer');
    const icons={success:'✅',error:'❌',info:'ℹ️'};
    const t=document.createElement('div');t.className=`toast ${type}`;
    t.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{t.style.animation='toastIn .3s ease reverse';setTimeout(()=>t.remove(),300);},dur);
  }
  function showLoading(v){document.getElementById('loadingOverlay').classList.toggle('show',v);}

  const name=localStorage.getItem('quizUserName');
  const score=parseInt(localStorage.getItem('quizScore')||'0');
  const total=parseInt(localStorage.getItem('quizTotal')||'20');
  if(!name){window.location.href='/';throw 0;}

  const pct=Math.round((score/total)*100);

  function getResult(){
    if(pct>=90)return{title:'Xuất sắc! 🏆',badge:'Top Performer',icon:'🏆'};
    if(pct>=70)return{title:'Tốt lắm! 🎯',badge:'Khá giỏi',icon:'🎯'};
    if(pct>=50)return{title:'Ổn đó! 👍',badge:'Trung bình',icon:'👍'};
    return{title:'Cần cố gắng! 💪',badge:'Tiếp tục học',icon:'💪'};
  }

  function render(){
    const d=getResult();
    document.getElementById('scoreDisplay').textContent=`${score}/${total}`;
    document.getElementById('resultTitle').textContent=d.title;
    document.getElementById('resultName').textContent=name;
    document.getElementById('pctDisplay').textContent=pct+'%';
    document.getElementById('rankBadge').textContent=d.badge;
    document.getElementById('resultIcon').textContent=d.icon;
    document.getElementById('correctNum').textContent=score;
    document.getElementById('wrongNum').textContent=total-score;
    // Animate ring
    const circumference=2*Math.PI*110;
    const offset=circumference-(circumference*pct/100);
    setTimeout(()=>{document.getElementById('scoreRing').style.strokeDashoffset=offset;},200);
  }

  async function submitScore(){
    showLoading(true);
    try{
      await fetch('/submit-score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,score,total})});
      document.getElementById('savedBadge').classList.remove('hidden');
      showToast('Điểm đã được lưu!','success');
    }catch(e){showToast('Lỗi lưu điểm','error');}
    finally{showLoading(false);}
  }

  function playAgain(){
    localStorage.removeItem('quizScore');localStorage.removeItem('quizTotal');
    window.location.href='/';
  }

  render();submitScore();
</script>
</body>
</html>
